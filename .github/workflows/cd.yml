name: CD

on:
  push:
    branches: [main] # deploy only when code lands on main

concurrency:
  group: cd-production
  cancel-in-progress: false # never cancel an in-flight deployment

env:
  NODE_VERSION: "22"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to production (Vercel)
  # Set these secrets in GitHub → Settings → Secrets and variables → Actions:
  #   VERCEL_TOKEN         — from vercel.com/account/tokens
  #   VERCEL_ORG_ID        — from .vercel/project.json after `vercel link`
  #   VERCEL_PROJECT_ID    — from .vercel/project.json after `vercel link`
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Post deployment URL to summary
        run: echo "### Deployed to ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
